# 测试环境：敏感信息通过环境变量注入（如 GitHub Actions / 部署平台读取 GitHub Environments「test」中的 Secrets）。
# 本地执行 mvn test 时若未设置下列变量，则使用默认值（内存 H2），便于 CI 无密钥也能跑通。

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:vibecampus_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

  # data:
  #   redis:
  #     host: ${SPRING_DATA_REDIS_HOST:localhost}
  #     port: ${SPRING_DATA_REDIS_PORT:6379}
  #     password: ${SPRING_DATA_REDIS_PASSWORD:}

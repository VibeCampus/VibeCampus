name: CI/CD Deploy

on:
  push:
    branches: [develop, main]
    paths:
      - "VibeCampus-Backend/**"
      - "VibeCampus-Frontend/**"
      - "deploy/**"
      - ".github/workflows/cicd-deploy.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "VibeCampus-Backend/**"
      - "VibeCampus-Frontend/**"
      - "deploy/**"
      - ".github/workflows/cicd-deploy.yml"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'VibeCampus-Backend/**'
            frontend:
              - 'VibeCampus-Frontend/**'
            deploy:
              - 'deploy/**'

  deploy_test:
    runs-on: ubuntu-latest
    needs: [changes]
    if: >
      (
        (github.event_name == 'push' && github.ref_name == 'develop') ||
        (github.event_name == 'pull_request' && github.base_ref == 'develop')
      ) &&
      (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.deploy == 'true'
      ) &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.fork == false
      )
    env:
      IMAGE_TAG: test
    steps:
      - uses: actions/checkout@v4

      - name: Compute changed services
        id: services
        shell: bash
        run: |
          backend_changed="${{ needs.changes.outputs.backend }}"
          frontend_changed="${{ needs.changes.outputs.frontend }}"
          deploy_changed="${{ needs.changes.outputs.deploy }}"

          if [ "$deploy_changed" = "true" ]; then
            backend_changed="true"
            frontend_changed="true"
          fi

          services=""
          images="mysql:8.0"
          if [ "$backend_changed" = "true" ]; then
            services="$services backend"
            images="$images vibecampus-backend:$IMAGE_TAG"
          fi
          if [ "$frontend_changed" = "true" ]; then
            services="$services web"
            images="$images vibecampus-web:$IMAGE_TAG"
          fi

          echo "services=${services# }" >> "$GITHUB_OUTPUT"
          echo "images=$images" >> "$GITHUB_OUTPUT"

      - name: Build backend image (test)
        if: contains(steps.services.outputs.services, 'backend')
        run: docker build -f deploy/test/backend/Dockerfile -t vibecampus-backend:${{ env.IMAGE_TAG }} .

      - name: Build frontend image (test)
        if: contains(steps.services.outputs.services, 'web')
        run: docker build -f deploy/test/frontend/Dockerfile -t vibecampus-web:${{ env.IMAGE_TAG }} --build-arg VITE_API_BASE_URL=/api .

      - name: Pull mysql image
        run: docker pull mysql:8.0

      - name: Save deployment images tar
        run: |
          mkdir -p _bundle
          docker save ${{ steps.services.outputs.images }} -o _bundle/images-test.tar
          chmod 644 _bundle/images-test.tar

      - name: Upload bundle to test server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "_bundle/images-test.tar,deploy/test/docker-compose.images.yml,schema.mysql.sql"
          target: "${{ secrets.SERVER_BASE_DIR }}/test/source"
          rm: true
          overwrite: true

      - name: Deploy test environment
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_BASE_DIR: ${{ secrets.SERVER_BASE_DIR }}
          SERVICES: ${{ steps.services.outputs.services }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.TEST_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.TEST_MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.TEST_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.TEST_MYSQL_PASSWORD }}
          SPRING_PROFILES_ACTIVE: test
          WEB_PORT: ${{ secrets.TEST_WEB_PORT }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: SERVER_BASE_DIR,SERVICES,IMAGE_TAG,MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,SPRING_PROFILES_ACTIVE,WEB_PORT
          script: |
            set -e
            cd "$SERVER_BASE_DIR/test/source"

            printf '%s\n' \
              "MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD" \
              "MYSQL_DATABASE=${MYSQL_DATABASE:-vibecampus}" \
              "MYSQL_USER=${MYSQL_USER:-vibecampus}" \
              "MYSQL_PASSWORD=$MYSQL_PASSWORD" \
              "SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE" \
              "WEB_PORT=${WEB_PORT:-8081}" \
              "IMAGE_TAG=$IMAGE_TAG" \
              > deploy/test/.env

            docker load -i _bundle/images-test.tar

            if [ -z "$SERVICES" ]; then
              SERVICES="backend web"
            fi

            docker compose --project-name vibecampus-test -f deploy/test/docker-compose.images.yml --env-file deploy/test/.env up -d $SERVICES

  deploy_prod:
    runs-on: ubuntu-latest
    needs: [changes]
    if: >
      (
        (github.event_name == 'push' && github.ref_name == 'main') ||
        (github.event_name == 'pull_request' && github.base_ref == 'main')
      ) &&
      (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.deploy == 'true'
      ) &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.fork == false
      )
    env:
      IMAGE_TAG: prod
    steps:
      - uses: actions/checkout@v4

      - name: Compute changed services
        id: services
        shell: bash
        run: |
          backend_changed="${{ needs.changes.outputs.backend }}"
          frontend_changed="${{ needs.changes.outputs.frontend }}"
          deploy_changed="${{ needs.changes.outputs.deploy }}"

          if [ "$deploy_changed" = "true" ]; then
            backend_changed="true"
            frontend_changed="true"
          fi

          services=""
          images="mysql:8.0"
          if [ "$backend_changed" = "true" ]; then
            services="$services backend"
            images="$images vibecampus-backend:$IMAGE_TAG"
          fi
          if [ "$frontend_changed" = "true" ]; then
            services="$services web"
            images="$images vibecampus-web:$IMAGE_TAG"
          fi

          echo "services=${services# }" >> "$GITHUB_OUTPUT"
          echo "images=$images" >> "$GITHUB_OUTPUT"

      - name: Build backend image (prod)
        if: contains(steps.services.outputs.services, 'backend')
        run: docker build -f deploy/test/backend/Dockerfile -t vibecampus-backend:${{ env.IMAGE_TAG }} .

      - name: Build frontend image (prod)
        if: contains(steps.services.outputs.services, 'web')
        run: docker build -f deploy/test/frontend/Dockerfile -t vibecampus-web:${{ env.IMAGE_TAG }} --build-arg VITE_API_BASE_URL=/api .

      - name: Pull mysql image
        run: docker pull mysql:8.0

      - name: Save deployment images tar
        run: |
          mkdir -p _bundle
          docker save ${{ steps.services.outputs.images }} -o _bundle/images-prod.tar
          chmod 644 _bundle/images-prod.tar

      - name: Upload bundle to prod server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "_bundle/images-prod.tar,deploy/prod/docker-compose.images.yml,schema.mysql.sql"
          target: "${{ secrets.SERVER_BASE_DIR }}/prod/source"
          rm: true
          overwrite: true

      - name: Deploy production environment
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_BASE_DIR: ${{ secrets.SERVER_BASE_DIR }}
          SERVICES: ${{ steps.services.outputs.services }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.PROD_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.PROD_MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.PROD_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.PROD_MYSQL_PASSWORD }}
          SPRING_PROFILES_ACTIVE: prod
          WEB_PORT: ${{ secrets.PROD_WEB_PORT }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: SERVER_BASE_DIR,SERVICES,IMAGE_TAG,MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,SPRING_PROFILES_ACTIVE,WEB_PORT
          script: |
            set -e
            cd "$SERVER_BASE_DIR/prod/source"

            printf '%s\n' \
              "MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD" \
              "MYSQL_DATABASE=${MYSQL_DATABASE:-vibecampus}" \
              "MYSQL_USER=${MYSQL_USER:-vibecampus}" \
              "MYSQL_PASSWORD=$MYSQL_PASSWORD" \
              "SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE" \
              "WEB_PORT=${WEB_PORT:-80}" \
              "IMAGE_TAG=$IMAGE_TAG" \
              > deploy/prod/.env

            docker load -i _bundle/images-prod.tar

            if [ -z "$SERVICES" ]; then
              SERVICES="backend web"
            fi

            docker compose --project-name vibecampus-prod -f deploy/prod/docker-compose.images.yml --env-file deploy/prod/.env up -d $SERVICES

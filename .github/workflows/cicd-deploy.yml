name: CI/CD Deploy

on:
  push:
    branches: [develop]
    paths:
      - "VibeCampus-Backend/**"
      - "VibeCampus-Frontend/**"
      - "deploy/**"
      - ".github/workflows/cicd-deploy.yml"
  pull_request:
    branches: [develop]
    paths:
      - "VibeCampus-Backend/**"
      - "VibeCampus-Frontend/**"
      - "deploy/**"
      - ".github/workflows/cicd-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Deploy production environment"
        required: true
        default: true
        type: boolean

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'VibeCampus-Backend/**'
            frontend:
              - 'VibeCampus-Frontend/**'
            deploy:
              - 'deploy/**'

  deploy_test:
    runs-on: ubuntu-latest
    needs: [changes]
    if: >
      (
        (github.event_name == 'push' && github.ref_name == 'develop') ||
        (github.event_name == 'pull_request' && github.base_ref == 'develop')
      ) &&
      (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.deploy == 'true'
      ) &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.fork == false
      )
    steps:
      - uses: actions/checkout@v4

      - name: Compute changed services
        id: services
        shell: bash
        run: |
          backend_changed="${{ needs.changes.outputs.backend }}"
          frontend_changed="${{ needs.changes.outputs.frontend }}"
          deploy_changed="${{ needs.changes.outputs.deploy }}"

          if [ "$deploy_changed" = "true" ]; then
            backend_changed="true"
            frontend_changed="true"
          fi

          services=""
          if [ "$backend_changed" = "true" ]; then
            services="$services backend"
          fi
          if [ "$frontend_changed" = "true" ]; then
            services="$services web"
          fi

          echo "services=${services# }" >> "$GITHUB_OUTPUT"

      - name: Upload source to test server path
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "VibeCampus-Backend,VibeCampus-Frontend,deploy,schema.mysql.sql"
          target: "${{ secrets.SERVER_BASE_DIR }}/test/source"
          rm: true
          overwrite: true

      - name: Deploy test environment
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_BASE_DIR: ${{ secrets.SERVER_BASE_DIR }}
          SERVICES: ${{ steps.services.outputs.services }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.TEST_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.TEST_MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.TEST_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.TEST_MYSQL_PASSWORD }}
          SPRING_PROFILES_ACTIVE: test
          WEB_PORT: ${{ secrets.TEST_WEB_PORT }}
          APP_JWT_SECRET: ${{ secrets.TEST_APP_JWT_SECRET }}
          APP_JWT_EXPIRATION_MINUTES: ${{ secrets.TEST_APP_JWT_EXPIRATION_MINUTES }}
          APP_JWT_ISSUER: ${{ secrets.TEST_APP_JWT_ISSUER }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: SERVER_BASE_DIR,SERVICES,MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,SPRING_PROFILES_ACTIVE,WEB_PORT,APP_JWT_SECRET,APP_JWT_EXPIRATION_MINUTES,APP_JWT_ISSUER
          script: |
            set -e
            cd "$SERVER_BASE_DIR/test/source"

            printf '%s\n' \
              "MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD" \
              "MYSQL_DATABASE=${MYSQL_DATABASE:-vibecampus}" \
              "MYSQL_USER=${MYSQL_USER:-vibecampus}" \
              "MYSQL_PASSWORD=$MYSQL_PASSWORD" \
              "SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE" \
              "WEB_PORT=${WEB_PORT:-8081}" \
              "APP_JWT_SECRET=$APP_JWT_SECRET" \
              "APP_JWT_EXPIRATION_MINUTES=${APP_JWT_EXPIRATION_MINUTES:-120}" \
              "APP_JWT_ISSUER=${APP_JWT_ISSUER:-vibecampus-test}" \
              > deploy/test/.env

            if [ -z "$SERVICES" ]; then
              SERVICES="backend web"
            fi

            docker compose --project-name vibecampus-test -f deploy/test/docker-compose.yml --env-file deploy/test/.env up -d --build $SERVICES

  deploy_prod:
    runs-on: ubuntu-latest
    needs: [changes]
    if: >
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.deploy_production == true &&
        github.ref_name == 'main'
      ) &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.deploy == 'true'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Compute changed services
        id: services
        shell: bash
        run: |
          backend_changed="${{ needs.changes.outputs.backend }}"
          frontend_changed="${{ needs.changes.outputs.frontend }}"
          deploy_changed="${{ needs.changes.outputs.deploy }}"

          if [ "$deploy_changed" = "true" ]; then
            backend_changed="true"
            frontend_changed="true"
          fi

          services=""
          if [ "$backend_changed" = "true" ]; then
            services="$services backend"
          fi
          if [ "$frontend_changed" = "true" ]; then
            services="$services web"
          fi

          echo "services=${services# }" >> "$GITHUB_OUTPUT"

      - name: Upload source to prod server path
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "VibeCampus-Backend,VibeCampus-Frontend,deploy,schema.mysql.sql"
          target: "${{ secrets.SERVER_BASE_DIR }}/prod/source"
          rm: true
          overwrite: true

      - name: Deploy production environment
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_BASE_DIR: ${{ secrets.SERVER_BASE_DIR }}
          SERVICES: ${{ steps.services.outputs.services }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.PROD_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.PROD_MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.PROD_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.PROD_MYSQL_PASSWORD }}
          SPRING_PROFILES_ACTIVE: prod
          WEB_PORT: ${{ secrets.PROD_WEB_PORT }}
          APP_JWT_SECRET: ${{ secrets.PROD_APP_JWT_SECRET }}
          APP_JWT_EXPIRATION_MINUTES: ${{ secrets.PROD_APP_JWT_EXPIRATION_MINUTES }}
          APP_JWT_ISSUER: ${{ secrets.PROD_APP_JWT_ISSUER }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: SERVER_BASE_DIR,SERVICES,MYSQL_ROOT_PASSWORD,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,SPRING_PROFILES_ACTIVE,WEB_PORT,APP_JWT_SECRET,APP_JWT_EXPIRATION_MINUTES,APP_JWT_ISSUER
          script: |
            set -e
            cd "$SERVER_BASE_DIR/prod/source"

            printf '%s\n' \
              "MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD" \
              "MYSQL_DATABASE=${MYSQL_DATABASE:-vibecampus}" \
              "MYSQL_USER=${MYSQL_USER:-vibecampus}" \
              "MYSQL_PASSWORD=$MYSQL_PASSWORD" \
              "SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE" \
              "WEB_PORT=${WEB_PORT:-80}" \
              "APP_JWT_SECRET=$APP_JWT_SECRET" \
              "APP_JWT_EXPIRATION_MINUTES=${APP_JWT_EXPIRATION_MINUTES:-120}" \
              "APP_JWT_ISSUER=${APP_JWT_ISSUER:-vibecampus}" \
              > deploy/prod/.env

            if [ -z "$SERVICES" ]; then
              SERVICES="backend web"
            fi

            docker compose --project-name vibecampus-prod -f deploy/prod/docker-compose.yml --env-file deploy/prod/.env up -d --build $SERVICES

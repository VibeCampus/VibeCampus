# 本机构建 JAR + 前端 dist 后上传，在服务器仅 docker build / up（不在服务器上跑 Maven/npm）
# 用法见 docs/服务器测试环境部署说明.md「本机构建 + 服务器仅打镜像」
#
# 在 deploy/test/prebuilt 目录执行：
#   docker compose --env-file .env up -d --build

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vibecampus}
      MYSQL_USER: ${MYSQL_USER:-vibecampus}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ${MYSQL_INIT_SQL:-../../../schema.mysql.sql}:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-vibecampus}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-vibecampus}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:

# VibeCampus 测试环境（裸机 / 云主机，无域名，HTTP 80）
# 在镜像内执行 Maven / npm 构建；若改为本机打 JAR + dist 上传，请用 deploy/test/prebuilt/
# 用法见 docs/服务器测试环境部署说明.md
#
# 在 deploy/test 目录执行：
#   docker compose --env-file .env up -d --build

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vibecampus}
      MYSQL_USER: ${MYSQL_USER:-vibecampus}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      # 仅在数据目录为空时执行；见 docs/数据库说明文档.md
      - ../../schema.mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    build:
      context: ../..
      dockerfile: deploy/test/backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-vibecampus}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-vibecampus}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: deploy/test/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
